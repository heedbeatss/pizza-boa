<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#581c87">
  <title>Pizza Boa - Delivery</title>
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(88, 28, 135, 0.4);
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 8px;
    }
    .slogan {
      font-size: 16px;
      color: #a1a1a1;
      margin-bottom: 32px;
    }
    .info {
      background: rgba(88, 28, 135, 0.15);
      border: 1px solid rgba(88, 28, 135, 0.3);
      border-radius: 16px;
      padding: 20px;
      max-width: 320px;
      width: 100%;
      margin-bottom: 24px;
    }
    .info p {
      font-size: 14px;
      color: #a1a1a1;
      margin-bottom: 8px;
    }
    .info strong {
      color: #a855f7;
    }
    .whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      background: #25d366;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .whatsapp:hover {
      transform: scale(1.05);
    }
    .horario {
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <img src="icons/icon-192.png" alt="Pizza Boa" class="logo">
  <h1>Pizza Boa</h1>
  <p class="slogan">Delivery</p>

  <div class="info">
    <p>📍 Piracicaba - SP</p>
    <p>🕐 Terça a Domingo</p>
    <p><strong>18h - 01h</strong></p>
  </div>

  <a class="whatsapp" href="https://wa.me/19984356289" target="_blank">
    📱 Fale conosco no WhatsApp
  </a>

  <p class="horario">Peça pelo WhatsApp ou visite-nos!</p>
</body>
</html>
